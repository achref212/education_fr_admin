<div class="head">
  <h1>Questions quiz</h1>
  <button mat-raised-button color="primary" type="button" (click)="create()">
    <mat-icon>add</mat-icon>
    Nouvelle
  </button>
</div>
@if (loading()) {
  <div class="center"><mat-spinner /></div>
} @else {
  @if (error()) {
    <p class="err">{{ error() }}</p>
  }
  <table mat-table [dataSource]="dataSource" class="mat-elevation-z1">
    <ng-container matColumnDef="question">
      <th mat-header-cell *matHeaderCellDef>Question</th>
      <td mat-cell *matCellDef="let r" class="clip">{{ r.question }}</td>
    </ng-container>
    <ng-container matColumnDef="category">
      <th mat-header-cell *matHeaderCellDef>Catégorie</th>
      <td mat-cell *matCellDef="let r">{{ r.category }}</td>
    </ng-container>
    <ng-container matColumnDef="level">
      <th mat-header-cell *matHeaderCellDef>Niveau</th>
      <td mat-cell *matCellDef="let r">{{ r.level }}</td>
    </ng-container>
    <ng-container matColumnDef="options">
      <th mat-header-cell *matHeaderCellDef>Options</th>
      <td mat-cell *matCellDef="let r">{{ r.options?.length || 0 }}</td>
    </ng-container>
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let r">
        <button mat-icon-button type="button" (click)="edit(r)">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button color="warn" type="button" (click)="remove(r)">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
}
