<nav class="bottom-nav" [class]="'bottom-nav--' + theme">
  @for (item of items; track item.label; let i = $index) {
    <div class="bottom-nav-item" [class.bottom-nav-item--active]="activeIndex === i">
      <mat-icon>{{ item.icon }}</mat-icon>
      <span>{{ item.label }}</span>
    </div>
  }
</nav>
